<!DOCTYPE html>
<html>
    <head>
        <title>Rock Paper Scissors</title>
        <link rel="stylesheet" href="rpc.css">
    </head>
    <body>
        <P class="title">Rock Paper Scissors</P>
        <button onclick="
        playGame('rock');
        " class="move-button"><img src="rock-emoji.png" class="move-icon"> </button>
        <button onclick="
        playGame('paper');
        " class="move-button"><img src="paper-emoji.png" class="move-icon"></button>
        <button onclick=" 
        playGame('scissors');
        " class="move-button"><img src="scissors-emoji.png" class="move-icon"></button>
        <p class="js-result result"></p>
        <p class="js-moves"></p>
        <P class="js-score score"></P>
        <button onclick="
        score.wins = 0;
        score.losses = 0;
        score.ties = 0;
        localStorage.removeItem('score');
        alert(`The Score was successfully reset`);
        updateScoreElement();
        " class="reset-score-button">Reset Score
        </button>
      <script src="rpc.js"></script>
    </body>
</html>
